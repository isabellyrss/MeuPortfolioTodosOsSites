    // Responsive icon resolver safely injecting SVG definitions via Lucide
    function LucideIcon({ name, className = "h-4 w-4" }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
          window.lucide.createIcons({ nodeList: ref.current.children });
        }
      }, [name, className]);
      return <span ref={ref} className="inline-flex shrink-0 items-center justify-center pointer-events-none" />;
    }
